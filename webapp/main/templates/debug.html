{% include 'navbar.html' %}
{% load static %}

<title>Analyze a QR code</title>

<head>
    <style>
        td{
            width: 10px;
            height: 10px;
            background-color: white;
            border: 0;
        }
        #qr_table{
            background-color: grey;
            border-collapse: collapse;
            margin: auto;
        }
        .black, body:has(#mask_switch:checked) .masked.white{
            background-color: black;
        }
        .white, body:has(#mask_switch:checked) .masked.black{
            background-color: white;
        }
        #qr_hex{
            width: 100%;
            height: 220px;
        }
        body:has(.functional:hover) .functional{
            background-color: rgb(255, 242, 167);
        }
        body:has(.functional:hover) .functional.black{
            background-color: rgb(100, 88, 0);
        }
        body:has(.mask:hover) .mask, body:has(.finfo_bch:hover) .mask{
            background-color: rgb(255, 242, 167);
        }
        body:has(.mask:hover) .mask.black, body:has(.finfo_bch:hover) .mask.black{
            background-color: rgb(100, 88, 0);
        }
        body:has(.ecl:hover) .ecl, body:has(.finfo_bch:hover) .ecl{
            background-color: rgb(255, 242, 167);
        }
        body:has(.ecl:hover) .ecl.black, body:has(.finfo_bch:hover) .ecl.black{
            background-color: rgb(100, 88, 0);
        }
        body:has(.mask:hover) .finfo_bch, body:has(.ecl:hover) .finfo_bch, body:has(.finfo_bch:hover) .finfo_bch{
            background-color: rgb(138, 227, 255)
        }
        body:has(.mask:hover) .finfo_bch.black, body:has(.ecl:hover) .finfo_bch.black, body:has(.finfo_bch:hover) .finfo_bch.black{
            background-color: rgb(2, 116, 142)
        }
    </style>
</head>

<body>
    <form class="poleqr" action="generator">
        <div class="left">
            <table>
                <tr><td><label for="version" class="functional">Version: </label></td><td><input type="number" id="version"></td></tr>
                <tr>
                    <td><label for="mask" class="mask">Mask: </label></td><td><input type="number" id="mask"></td>
                    <td><label for="mask_switch" class="mask_switch">On?</label></td><td><input type="checkbox" id="mask_switch" checked></td></label></td>
                </tr>
                <tr><td><label for="ecl" class="ecl">ECL: </label></td><td><input type="number" id="ecl"></td></tr>
            </table>
        </div>

        <div class="right">
            <table id="qr_table"></table>
            <textarea id="qr_hex">fec717bfc11f2e106eb0d6abb75a7155dbabdd82ec15708507faaaaafe008f76003f5af7dee2407ff329af28a6f828e978b6b993d3df03990eeb4da0887bf0f8f8f84ba5a5a5f03838382ba5a5a5a0292a1a85e4f7ebdd28a9bfa8c9f9eb7d10ab9b694380c8fa8037c5c4bfb1152af0501251cba8b9bfd5d5433ffeeb44455504cddc61fe4444dc</textarea>
        </div>
    </form>


    <script>
        alert("WARNING! This feature is in development and might not work properly.")
        document.getElementById("version").addEventListener('input', function (evt) {
            create_table(17+4*this.value)
        });

        function create_table(width){
            let table = document.getElementById("qr_table")
            table.innerHTML=""
            for(let i=0;i<width;i++){
                let row = table.insertRow()
                for(let j=0;j<width;j++){
                    row.insertCell()
                }
            }
        }

        function populate_table(qr_bytearray){
            let cells = document.getElementById("qr_table").getElementsByTagName("td")
            for (let i=0; i<cells.length; i++){
                if( (qr_bytearray[Math.floor(i/8)] & (1<<(7-i%8))) > 0 ){
                    cells[i].classList.add("black")
                }else{
                    cells[i].classList.add("white")
                }
            }
        }

        function qr_to_table(qr_bytearray){
            let width = Math.round(Math.sqrt(qr_bytearray.length*8))
            document.getElementById("version").value = (width-17)/4
            create_table(width)
            populate_table(qr_bytearray)
            get_format_information(qr_bytearray)
            label_funtional(qr_bytearray)
            demask(qr_bytearray)
        }

        function get_format_information(qr_bytearray){
            let cells = document.getElementById("qr_table").getElementsByTagName("td")
            let width = document.getElementById("qr_table").getElementsByTagName("tr").length
            let mask = neg_value_of(cells[8*width+2])*4+value_of(cells[8*width+2])*2+neg_value_of(cells[8*width+2])
            document.getElementById("mask").value = mask
            let ecl = neg_value_of(cells[8*width])*2+value_of(cells[8*width])
            document.getElementById("ecl").value = ecl

            cells[8*width+0].classList.add("ecl")
            cells[8*width+1].classList.add("ecl")
            cells[8*width+2].classList.add("mask")
            cells[8*width+3].classList.add("mask")
            cells[8*width+4].classList.add("mask")
            cells[8*width+5].classList.add("finfo_bch")
            cells[8*width+7].classList.add("finfo_bch")
            cells[8*width+8].classList.add("finfo_bch")
            cells[7*width+8].classList.add("finfo_bch")
            cells[5*width+8].classList.add("finfo_bch")
            cells[4*width+8].classList.add("finfo_bch")
            cells[3*width+8].classList.add("finfo_bch")
            cells[2*width+8].classList.add("finfo_bch")
            cells[1*width+8].classList.add("finfo_bch")
            cells[0*width+8].classList.add("finfo_bch")

            cells[(width-1)*width+8].classList.add("ecl")
            cells[(width-2)*width+8].classList.add("ecl")
            cells[(width-3)*width+8].classList.add("mask")
            cells[(width-4)*width+8].classList.add("mask")
            cells[(width-5)*width+8].classList.add("mask")
            cells[(width-6)*width+8].classList.add("finfo_bch")
            cells[(width-7)*width+8].classList.add("finfo_bch")
            cells[8*width+width-8].classList.add("finfo_bch")
            cells[8*width+width-7].classList.add("finfo_bch")
            cells[8*width+width-6].classList.add("finfo_bch")
            cells[8*width+width-5].classList.add("finfo_bch")
            cells[8*width+width-4].classList.add("finfo_bch")
            cells[8*width+width-3].classList.add("finfo_bch")
            cells[8*width+width-2].classList.add("finfo_bch")
            cells[8*width+width-1].classList.add("finfo_bch")


        }

        function label_funtional(qr_bytearray){
            let cells = document.getElementById("qr_table").getElementsByTagName("td")
            let width = document.getElementById("qr_table").getElementsByTagName("tr").length
            let version = get_version_from_width(width)

            for (let y=0; y<8;y++){
                for (let x=0; x<8;x++){
                    cells[y*width+x].classList.add("functional")
                    cells[(width-y-1)*width+x].classList.add("functional")
                    cells[y*width+(width-x-1)].classList.add("functional")
                }
            }
            for(let i=8;i<width-8;i++){
                cells[6*width+i].classList.add("functional")
                cells[i*width+6].classList.add("functional")
            }

            if (version>1){
                let grid_size = Math.floor(version / 7) + 2
                let spacing = Math.floor((width - 12) / (grid_size - 1))
                for (let x=0; x<grid_size; x++){
                    for (let y=0; y<grid_size; y++){
                        if (x == 0 && y == 0){
                            continue
                        }
                        if (x == grid_size - 1 && y == 0){
                            continue
                        }
                        if (x == 0 && y == grid_size - 1){
                            continue
                        }
                        for (let i=-2; i<3; i++){
                            for (let j=-2; j<3; j++){
                                let r = 5 + y * spacing + j
                                let c = 5 + x * spacing + i
                                cells[r*width+c].classList.add("functional")
                            }
                        }
                    }
                }
            }

        }

        function get_version_from_width(width){
            return (width-17)/4
        }

        function demask(qt_bytearray){
            let cells = document.getElementById("qr_table").getElementsByTagName("td")
            let width = document.getElementById("qr_table").getElementsByTagName("tr").length
            let mask = document.getElementById("mask").value
            for (let i=0; i<width; i++){
                for (let j=0; j<width; j++){
                    let cell = cells[i*width + j] 
                    if(cell.classList.contains("functional") || cell.classList.contains("ecl") || cell.classList.contains("mask") || cell.classList.contains("finfo_bch")){
                        continue
                    }
                    let is_masked = false
                    if (mask == 0 && (i + j) % 2 == 0) is_masked = true
                    if (mask == 1 && i % 2 == 0) is_masked = true
                    if (mask == 2 && j % 3 == 0)is_masked = true
                    if (mask == 3 && (i + j) % 3 == 0)is_masked = true
                    if (mask == 4 && (Math.floor(i / 2) + Math.floor(j / 3)) % 2 == 0)is_masked = true
                    if (mask == 5 && (i * j) % 2 + (i * j) % 3 == 0)is_masked = true
                    if (mask == 6 && ((i * j) % 2 + (i * j) % 3) % 2 == 0)is_masked = true
                    if (mask == 7 && ((i + j) % 2 + (i * j) % 3) % 2 == 0)is_masked = true
                    if (is_masked){
                        cell.classList.add("masked")
                        flip(cell)
                    }
                }
            }
            
        }

        function flip(cell){
            if(cell.classList.contains("black")){
                cell.classList.remove("black")
                cell.classList.add("white")
            }
            else if(cell.classList.contains("white")){
                cell.classList.add("black")
                cell.classList.remove("white")
            }
        }

        function value_of(cell){
            if (cell.classList.contains("black")){
                return true
            }
            if (cell.classList.contains("white")){
                return false
            }
        }

        function neg_value_of(cell){
            if (cell.classList.contains("black")){
                return false
            }
            if (cell.classList.contains("white")){
                return true
            }
        }

        qr_to_table(Uint8Array.fromHex(document.getElementById("qr_hex").textContent))
    </script>
</body>
